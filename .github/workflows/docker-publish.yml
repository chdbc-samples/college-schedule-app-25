name: Docker Publish

on:
  workflow_call:

  workflow_dispatch:

jobs:
  # Публікує образ Docker-контейнера до GitHub Container Registry.
  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    # Надає доступ до коду репозиторію та публікації пакета.
    permissions:
      contents: read
      packages: write

    steps:
      # Крок 1: отримання коду з репозиторію.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: налаштування Buildx для збирання образу Docker-контейнера.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Крок 3: автентифікація в GitHub Container Registry.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Крок 4: формування назви образу Docker-контейнера, тегів і метаданих.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/college-schedule
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Крок 5: збирання та публікація образу Docker-контейнера.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
