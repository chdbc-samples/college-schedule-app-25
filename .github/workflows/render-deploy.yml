name: Render Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy from GHCR
        required: false
        default: latest
        type: string
  # Потрібно, щоб workflow було видно та можна було перевірити в pull request до merge в main.
  pull_request:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  # Виконує деплой застосунку в Render із вказаним Docker-образом.
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Дозволяє запуск вручну, у pull request або після успішного завершення workflow CI для гілки main.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    # Надає доступ до читання вмісту репозиторію.
    permissions:
      contents: read

    steps:
      # Крок 1: визначення адреси Docker-образу для деплою.
      - name: Resolve deploy settings
        id: settings
        shell: bash
        run: |
          image_repo="ghcr.io/${{ github.repository_owner }}/college-schedule"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "image_url=${image_repo}:sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_url=${image_repo}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      # Крок 2: перевірка наявності обов'язкових секретів GitHub Actions для Render.
      - name: Validate Render secrets
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          missing=()

          [[ -z "$RENDER_API_KEY" ]] && missing+=("RENDER_API_KEY")
          [[ -z "$RENDER_SERVICE_ID" ]] && missing+=("RENDER_SERVICE_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      # Крок 3: запуск нового деплою в Render із заданим Docker-образом.
      - name: Trigger Render deploy
        id: deploy
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          IMAGE_URL: ${{ steps.settings.outputs.image_url }}
        run: |
          response="$(
            curl --silent --show-error --fail-with-body \
              --request POST \
              --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data "$(jq -cn --arg imageUrl "$IMAGE_URL" '{imageUrl: $imageUrl}')"
          )"

          deploy_id="$(jq -r '.id // empty' <<<"$response")"
          if [[ -z "$deploy_id" ]]; then
            printf 'Render deploy response did not include a deploy id.\n%s\n' "$response" >&2
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "$GITHUB_OUTPUT"

      # Крок 4: очікування завершення деплою та перевірка фінального статусу.
      - name: Wait for Render deploy
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          for attempt in {1..40}; do
            response="$(
              curl --silent --show-error --fail-with-body \
                --request GET \
                --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
                --header "Authorization: Bearer ${RENDER_API_KEY}"
            )"

            status="$(jq -r '.status // empty' <<<"$response")"
            printf 'Render deploy %s status: %s\n' "$DEPLOY_ID" "$status"

            case "$status" in
              live)
                exit 0
                ;;
              build_failed|update_failed|canceled|cancelled|failed|deactivated)
                printf 'Render deploy %s finished with failing status: %s\n' "$DEPLOY_ID" "$status" >&2
                printf '%s\n' "$response" >&2
                exit 1
                ;;
            esac

            sleep 15
          done

          printf 'Timed out waiting for Render deploy %s to finish.\n' "$DEPLOY_ID" >&2
          exit 1
